<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Plan Assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        header {
            background-color: #264969;
            color: white;
            padding: 1rem 0;
            text-align: center;
        }

        header h1 {
            margin: 0;
        }

        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 1rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        section {
            margin-bottom: 2rem;
        }

        section h2 {
            color: #264969;
            font-family: Georgia, serif;
        }

        .color-box {
            display: inline-block;
            width: 100px;
            height: 50px;
            margin-right: 1rem;
            border-radius: 4px;
        }

        .logo-preview {
            text-align: center;
            margin-top: 1rem;
        }

        .logo-preview img {
            max-width: 200px;
            border: 2px solid #264969;
            border-radius: 8px;
        }

        .coolors-link {
            display: inline-block;
            background-color: #b4cde4;
            color: #264969;
            padding: 0.5rem 1rem;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 1rem;
        }

        .coolors-link:hover {
            background-color: #264969;
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <h1>Site Plan Assignment</h1>
    </header>

    <main>
        <section>
            <h2>Logo</h2>
            <div class="logo-preview">
                <img src="/week03//wwr/downriver.png" alt="Site Logo"id="logoPreview">
            </div>
        </section>

        <section>
            <h2>Color Palette</h2>
            <div>
                <div class="color-box" style="background-color: #264969;"></div>
                <strong>Primary Color:</strong> #264969
            </div>
            <div>
                <div class="color-box" style="background-color: #505033;"></div>
                <strong>Secondary Color:</strong> #505033
            </div>
            <div>
                <div class="color-box" style="background-color: #B4CDE4;"></div>
                <strong>Accent1 Color:</strong> #B4CDE4
            </div>
            <div>
                <div class="color-box" style="background-color: #CFCFB4;"></div>
                <strong>Accent2 Color:</strong> #CFCFB4
            </div>
        </section>

        <section>
            <h2>Typography</h2>
            <p><strong>Heading Font:</strong> Georgia</p>
            <p><strong>Body Font:</strong> Roboto</p>
        </section>

        <section>
            <h2>Coolors Palette Link</h2>
            <a class="coolors-link" href="https://coolors.co/264969-505033-b4cde4-cfcfb4" target="_blank">View Palette on Coolors.co</a>
        </section>
    </main>

</body>

</html>
