<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- IMPORTANT -->
  <meta name="description" content="Contact Dry Oar Rafting for reservations, inquiries, or feedback. Reach us by phone, email, or our contact form.">

  <title>Contact Us | Dry Oar Rafting</title>

  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <img src="images/logo.png" alt="Rafting Logo" class="logo">

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>

  <!-- CONTACT INFO -->
  <section class="contact-info">
    <h1>Contact Us</h1>

    <p><strong>Address:</strong> 123 River Road, Freetown, Sierra Leone</p>
    <p><strong>Phone:</strong> +232 76 123456</p>
    <p><strong>Email:</strong> info@dryoarrafting.com</p>

    <!-- GOOGLE MAP -->
    <iframe 
      src="https://www.google.com/maps?q=Freetown,Sierra%20Leone&output=embed"
      loading="lazy">
    </iframe>
  </section>

  <!-- EMPLOYEES -->
  <section class="employees">
    <h2>Meet Our Team</h2>

    <div class="employee-grid">

      <figure>
        <img src="images/guide1.jpg" alt="Lead Guide">
        <figcaption>John Kamara – Lead Guide</figcaption>
      </figure>

      <figure>
        <img src="images/manager.jpg" alt="Operations Manager">
        <figcaption>Fatmata Sesay – Operations Manager</figcaption>
      </figure>

      <figure>
        <img src="images/support.jpg" alt="Customer Support">
        <figcaption>Abdul Bangura – Customer Support</figcaption>
      </figure>

    </div>
  </section>

  <!-- FORM -->
  <section class="contact-form">
    <h2>Send Us a Message</h2>

    <form>

      <!-- NAME -->
      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" required>

      <!-- EMAIL -->
      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" required>

      <!-- RADIO BUTTONS -->
      <fieldset>
        <legend>Purpose of Message:</legend>

        <label>
          <input type="radio" name="purpose" value="general" required>
          General Inquiry
        </label>

        <label>
          <input type="radio" name="purpose" value="reservation">
          Reservation Question
        </label>

        <label>
          <input type="radio" name="purpose" value="suggestion">
          Website Suggestion
        </label>
      </fieldset>

      <!-- MESSAGE -->
      <label for="message">Your Message:</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <!-- CHECKBOX -->
      <label>
        <input type="checkbox" name="subscribe">
        Please subscribe me to the monthly newsletter
      </label>

      <!-- SUBMIT -->
      <button type="submit" class="btn">Send Message</button>

    </form>
  </section>

</main>

<!-- FOOTER -->
<footer>
  <p>© 2026 | Dry Oar Rafting | Ansu Tommy</p>

  <nav class="socialmedia">
    <a href="#"><img src="images/facebook-icon.png" alt="Facebook"></a>
    <a href="#"><img src="images/twitter-icon.png" alt="Twitter"></a>
    <a href="#"><img src="images/instagram-icon.png" alt="Instagram"></a>
  </nav>
</footer>

</body>
</html>
