<main>
  <section class="contact-info">
    <h1>Contact Us</h1>
    <div class="info-grid">
      <div class="address-details">
        <p><strong>Address:</strong> 123 River Run Road, Freetown, Sierra Leone</p>
        <p><strong>Phone:</strong> +232 73 42 17 96</p>
        <p><strong>Email:</strong> info@dryoarrafting.com</p>
      </div>
      <div class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15805.448559385552!2d-13.2344!3d8.484!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2ssl!4v1710000000000" width="600" height="450" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </section>

  <section class="employees">
    <h2>Our Team</h2>
    <div class="employee-grid">
      <figure>
        <img src="images/profile.jpg" alt="Manager">
        <figcaption>Ansu Tommy - Founder & Lead Guide</figcaption>
      </figure>
      <figure>
        <img src="images/nicona.jpeg" alt="Booking Agent">
        <figcaption>Sarah Sesay - Reservations Manager</figcaption>
      </figure>
      <figure>
        <img src="images/morian.jpeg" alt="Safety Expert">
        <figcaption>Morian Bangura - Safety Coordinator</figcaption>
      </figure>
    </div>
  </section>

  <section class="contact-form">
    <h2>Send us a Message</h2>
    <form action="#" method="post">
      <div class="form-item">
        <label for="username">Name:</label>
        <input type="text" id="username" name="username" required>
      </div>

      <div class="form-item">
        <label for="useremail">Email:</label>
        <input type="email" id="useremail" name="useremail" required>
      </div>

      <fieldset>
        <legend>Purpose of Message</legend>
        <label><input type="radio" name="purpose" value="general" checked> General Inquiry</label>
        <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
        <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>
      </fieldset>

      <div class="form-item">
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4"></textarea>
      </div>

      <div class="form-item checkbox">
        <input type="checkbox" id="subscribe" name="subscribe">
        <label for="subscribe">Please subscribe me to the monthly newsletter</label>
      </div>

      <button type="submit">Send Message</button>
    </form>
  </section>
</main>
